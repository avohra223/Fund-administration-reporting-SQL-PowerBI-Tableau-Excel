name: Keep Streamlit Dashboard Alive

on:
  schedule:
    # Ping every 10 minutes to prevent Streamlit Cloud from sleeping
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping fund reporting dashboard
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://fund-reporting-dashboard.streamlit.app/ || true
      - name: Ping credit risk engine
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://credit-risk-engine-avohra.streamlit.app/ || true
